<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="url(#grad1)" stroke-width="2" opacity="0.3"/>
  <!-- Main circle -->
  <circle cx="100" cy="100" r="85" fill="#0f172a" />
  <!-- Help icon (question mark) -->
  <circle cx="100" cy="75" r="12" fill="url(#grad1)" />
  <text x="100" y="82" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">?</text>
  <!-- Support lines -->
  <line x1="65" y1="120" x2="95" y2="120" stroke="url(#grad1)" stroke-width="3" stroke-linecap="round"/>
  <line x1="105" y1="120" x2="135" y2="120" stroke="url(#grad1)" stroke-width="3" stroke-linecap="round"/>
  <!-- Dots indicating support -->
  <circle cx="70" cy="145" r="4" fill="url(#grad1)" opacity="0.8"/>
  <circle cx="100" cy="155" r="4" fill="url(#grad1)" opacity="0.6"/>
  <circle cx="130" cy="145" r="4" fill="url(#grad1)" opacity="0.8"/>
</svg>